server:
  port: 8083

spring:
  application:
    name: payment-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        retries: 3
        acks: all
        compression-type: snappy
        max-in-flight-requests-per-connection: 5
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.payment.event"
        spring.json.value.default.type: "com.example.payment.event.SagaEvent"
        spring.json.use.type.headers: false
        max-poll-records: 100
        fetch-min-bytes: 1024
        fetch-max-wait: 500
    listener:
      missing-topics-fatal: false
      admin:
        auto-create: true
      ack-mode: MANUAL_IMMEDIATE

services:
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}
  order:
    url: ${ORDER_SERVICE_URL:http://order-service:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents,metrics,prometheus
  endpoint:
    health:
      show-details: always
    circuitbreakers:
      enabled: true
    metrics:
      enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
        record-exceptions:
          - java.util.concurrent.TimeoutException
          - org.apache.kafka.common.errors.TimeoutException
          - org.springframework.kafka.KafkaException
          - java.util.concurrent.ExecutionException
          - com.example.payment.exception.ServiceUnavailableException
    instances:
      kafkaPublisher:
        base-config: default
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      notificationServiceCB:
        base-config: default
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 2
      orderServiceCB:
        base-config: default
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 2
      outboxProcessorCB:
        base-config: default
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.util.concurrent.TimeoutException
          - org.apache.kafka.common.errors.TimeoutException
          - org.springframework.kafka.KafkaException
          - com.example.payment.exception.ServiceUnavailableException
          - org.springframework.dao.DataAccessException
          - org.springframework.dao.OptimisticLockingFailureException
    instances:
      kafkaRetry:
        base-config: default
        max-attempts: 3
        wait-duration: 2s
      notificationRetry:
        base-config: default
        max-attempts: 3
        wait-duration: 2s
      orderRetry:
        base-config: default
        max-attempts: 3
        wait-duration: 2s

  timelimiter:
    configs:
      default:
        timeout-duration: 5s
    instances:
      kafkaTimeout:
        base-config: default
        timeout-duration: 10s

logging:
  level:
    com.example.payment: DEBUG
    org.springframework.kafka.retrytopic: INFO
    io.github.resilience4j: INFO
    org.springframework.web.client: DEBUG
    org.springframework.transaction: DEBUG
    org.hibernate.SQL: DEBUG