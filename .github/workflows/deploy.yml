name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Configure AWS credentials (OIDC, no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull latest code, images and restart the stack
        run: |
          # Dynamically find the EC2 instance by its Name tag - no hardcoded instance ID needed
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ecom-saga-app" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Deploying to instance: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }}" \
            --parameters '{"commands":[
              "if [ ! -d /home/ec2-user/app/.git ]; then git clone https://github.com/shravaneeghatol/ecom-saga-project.git /home/ec2-user/app; fi",
              "cd /home/ec2-user/app",
              "git fetch origin && git checkout main && git pull origin main",
              "if [ ! -f .env ]; then cp .env.example .env; fi",
              "docker compose -f docker-compose.yml -f Infrastructure/docker-compose.prod.yml pull",
              "docker compose -f docker-compose.yml -f Infrastructure/docker-compose.prod.yml up -d",
              "echo Waiting for services to boot...",
              "for p in 8081 8082 8083 8084; do",
              "  echo Checking port $p;",
              "  for i in {1..12}; do",
              "    curl -sf http://localhost:$p/actuator/health && break || echo Waiting...;",
              "    sleep 10;",
              "  done;",
              "  curl -sf http://localhost:$p/actuator/health || exit 1;",
              "done"
            ]}' \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
